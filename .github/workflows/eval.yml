name: Eval gate

# A green eval gate on every PR is the point: a regression that lets the critic
# miss an injected error, or start holding clean invoices, fails the build.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run benchmark and enforce thresholds
        run: apverify-eval --count 50 --min-catch-rate 0.99 --max-false-hold 0.0
